# OLB Node 2 Configuration (Docker Compose cluster demo)
version: "1"

listeners:
  - name: http
    address: ":8080"
    protocol: http
    routes:
      - path: /
        pool: echo-pool

admin:
  address: ":9090"
  enabled: true

logging:
  level: info
  format: json
  output: /var/log/olb/olb.log

pools:
  - name: echo-pool
    algorithm: round_robin
    health_check:
      type: http
      interval: "5s"
      timeout: "2s"
      path: /
    backends:
      - id: backend-1
        address: "backend-1:5678"
        weight: 1
      - id: backend-2
        address: "backend-2:5678"
        weight: 1
      - id: backend-3
        address: "backend-3:5678"
        weight: 1

cluster:
  enabled: true
  node_id: olb-2
  bind_addr: "172.28.0.11"
  bind_port: 7946
  peers:
    - "172.28.0.10:7946"
    - "172.28.0.12:7946"
