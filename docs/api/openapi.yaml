openapi: 3.0.3
info:
  title: OpenLoadBalancer Admin API
  description: |
    REST API for managing OpenLoadBalancer instances.

    ## Authentication
    All endpoints require Bearer token authentication via the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```

    ## Rate Limiting
    API requests are rate-limited to 1000 requests per minute per IP.
  version: 1.0.0
  contact:
    name: OpenLoadBalancer Team
    url: https://openloadbalancer.dev
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8081
    description: Local development
  - url: https://api.openloadbalancer.dev
    description: Production

tags:
  - name: Health
    description: Health check endpoints
  - name: Metrics
    description: Prometheus and runtime metrics
  - name: Backends
    description: Backend pool management
  - name: Config
    description: Configuration management
  - name: Cluster
    description: Cluster operations
  - name: WAF
    description: Web Application Firewall

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the load balancer
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags:
        - Metrics
      summary: Prometheus metrics
      description: Returns metrics in Prometheus exposition format
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /api/v1/status:
    get:
      tags:
        - Health
      summary: Detailed status
      description: Returns detailed status information
      operationId: getStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/backends:
    get:
      tags:
        - Backends
      summary: List backends
      description: Returns all backends in all pools
      operationId: listBackends
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of backends
          content:
            application/json:
              schema:
                type: object
                properties:
                  pools:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pool'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        version:
          type: string
        uptime:
          type: string

    StatusResponse:
      type: object
      properties:
        version:
          type: string
        uptime:
          type: string
        listeners:
          type: array
          items:
            type: object
        pools:
          type: integer
        backends:
          type: integer
        requests:
          type: object
          properties:
            total:
              type: integer
            errors:
              type: integer

    Pool:
      type: object
      properties:
        name:
          type: string
        algorithm:
          type: string
        backends:
          type: array
          items:
            $ref: '#/components/schemas/Backend'

    Backend:
      type: object
      properties:
        address:
          type: string
        weight:
          type: integer
        state:
          type: string
          enum: [up, down, draining, starting]
        connections:
          type: integer
        requests:
          type: integer
        errors:
          type: integer
